name: Chocolatine

on:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    branches-ignore:
      - "no-ga/**"

env:
  MIRROR_SSH_URL: git@github.com:dave123online/mirror.git
  EXECUTABLES: mysh
  CC: epiclang

jobs:
  check_not_mirror:
    name: Check if we are not running in the mirror repository
    runs-on: ubuntu-latest
    steps:
      - name: Fail if running inside the mirror repository
        run: |
          MIRROR_REPO=$(echo "$MIRROR_SSH_URL" | sed 's|.*:\(.*\)\.git$|\1|')
          if [ "$GITHUB_REPOSITORY" = "$MIRROR_REPO" ]; then
              echo "This the mirror repository. Skipping all jobs."
              exit 1
          fi
          echo "Not the mirror repository. Proceeding."

  check_compilation_and_coding_style:
    name: Check Compilation and Coding Style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run coding-style checker
        run: banana-check-repo

      - name: Compile project with make
        timeout-minutes: 2
        run: make

      - name: Display coding-style errors as annotations
        run: |
          if [ -f coding-style-reports.log ]; then
            while L= read -r line; do
              file=$(echo "$line" | cut -d':' -f1 | sed 's|^./||')
              lineno=$(echo "$line" | cut -d':' -f2)
              severity=$(echo "$line" | cut -d':' -f3 | tr -d ' ')
              message=$(echo "$line" | cut -d':' -f4-)
              echo "::error file=$file,line=$lineno::$severity coding style violation: ${message}"
            done < coding-style-reports.log
          fi

      - name: Fail if coding-style errors exist
        run: |
          if [ -s coding-style-reports.log ]; then
            echo "::error::Coding style errors found, failing job."
            exit 1
          fi

      - name: Clean build artifacts
        run: make clean

      - name: Verify executables execution
        run: |
          exit_code=0
          IFS=',' read -ra BINS <<< "$EXECUTABLES"
          for bin in "${BINS[@]}"; do
            bin=$(echo "$bin" | tr -d ' ')
            if [ ! -f "$bin" ]; then
              echo "::error file=${bin}::Executable '${bin}' is missing after compilation"
              exit_code=1
            elif [ ! -x "$bin" ]; then
              echo "::error file=${bin}::Executable '${bin}' exists but is not executable"
              exit_code=1
            fi
          done
          exit $exit_code
        shell: bash

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        timeout-minutes: 2
        run: make tests_run

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror push
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
